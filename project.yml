name: PianoCam
options:
  deploymentTarget:
    macOS: "14.0"
  bundleIdPrefix: com.mayank.pianocam
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    DEVELOPMENT_TEAM: ""
    ARCHS: "$(ARCHS_STANDARD)"
    ONLY_ACTIVE_ARCH: "NO"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: "YES"
targets:
  PianoCam:
    type: application
    platform: macOS
    sources:
      - path: PianoCam
    dependencies:
      - target: PianoCamExtension
        embed: true
        codeSign: true
    entitlements:
      path: PianoCam/PianoCam.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.camera: true
        com.apple.developer.system-extension.install: true
        com.apple.security.application-groups:
          - $(TeamIdentifierPrefix)group.com.mayank.pianocam
    info:
      path: PianoCam/Info.plist
      properties:
        CFBundleDisplayName: PianoCam
        NSCameraUsageDescription: PianoCam needs your webcam to composite a piano overlay.
        NSSystemExtensionUsageDescription: PianoCam installs a Camera Extension so your webcam with piano overlay is available to other apps.
        NSHumanReadableCopyright: MIT License
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mayank.pianocam
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: PianoCam/PianoCam.entitlements

  PianoCamExtension:
    type: system-extension
    platform: macOS
    sources:
      - path: PianoCamExtension
    entitlements:
      path: PianoCamExtension/PianoCamExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - $(TeamIdentifierPrefix)group.com.mayank.pianocam
    info:
      path: PianoCamExtension/Info.plist
      properties:
        CFBundleDisplayName: PianoCam Camera
        CFBundlePackageType: XPC!
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: MIT License
        CMIOExtension:
          CMIOExtensionMachServiceName: $(TeamIdentifierPrefix)com.mayank.pianocam.extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mayank.pianocam.extension
        WRAPPER_EXTENSION: systemextension
        PRODUCT_MODULE_NAME: PianoCamExtension
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: PianoCamExtension/PianoCamExtension.entitlements
        SKIP_INSTALL: "YES"
